services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # cap_add:
    #   - SYS_PTRACE
    # security_opt:
    #   - seccomp=unconfined

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=mongo
    ports:
      - 27017:27017
    volumes:
      - ./mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")' -u mongo -p mongo --authenticationDatabase admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  server-postgres:
    build: .
    container_name: server-postgres
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017
      - MONGO_DB=jsonb_experiments
      - DB=postgres
      - PORT=3001
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 3001:3001
    depends_on:
      postgres:
        condition: service_healthy

  server-mongo:
    build: .
    container_name: server-mongo
    restart: always
    environment:
      - DB=mongo
      - PORT=3002
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017
      - MONGO_DB=jsonb_experiments
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 3002:3002
    depends_on:
      mongodb:
        condition: service_healthy

  client-postgres:
    build: ./client
    container_name: client-postgres
    restart: always
    environment:
      - CLIENT_BASE_URL=http://server-postgres:3001
    depends_on:
      - server-postgres

  client-mongo:
    build: ./client
    container_name: client-mongo
    restart: always
    environment:
      - CLIENT_BASE_URL=http://server-mongo:3002
    depends_on:
      - server-mongo

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: always
    ports:
      - 8080:8080
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    privileged: true

  # pgadmin:
  #   image: dpage/pgadmin4
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@example.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   volumes:
  #     - ./pgadmin-data:/var/lib/pgadmin