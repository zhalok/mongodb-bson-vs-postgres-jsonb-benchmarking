services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track_planning=on"
      - "-c"
      - "shared_buffers=2GB"
    environment:
      - POSTGRES_PASSWORD=postgres
    ports:
      - 5432:5432
    volumes:
      - ./init-db:/docker-entrypoint-initdb.d
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    # cap_add:
    #   - SYS_PTRACE
    # security_opt:
    #   - seccomp=unconfined

  mongo-keyfile-init:
    image: alpine:3
    container_name: mongo-keyfile-init
    command:
      - "sh"
      - "-c"
      - "test -f /keyfile/mongo-keyfile || head -c 756 /dev/urandom | base64 > /keyfile/mongo-keyfile; chmod 400 /keyfile/mongo-keyfile; chown 999:999 /keyfile/mongo-keyfile"
    volumes:
      - mongo-keyfile:/keyfile
    restart: "no"

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    command:
      - "mongod"
      - "--replSet"
      - "rs0"
      - "--keyFile"
      - "/etc/mongo-keyfile/mongo-keyfile"
      - "--wiredTigerCacheSizeGB"
      - "2"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=mongo
      - MONGO_INITDB_ROOT_PASSWORD=mongo
    ports:
      - 27017:27017
    volumes:
      - ./mongo-data:/data/db
      - mongo-keyfile:/etc/mongo-keyfile:ro
    depends_on:
      mongo-keyfile-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand(\"ping\")' -u mongo -p mongo --authenticationDatabase admin"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-rs-init:
    image: mongo:7
    container_name: mongo-rs-init
    depends_on:
      mongodb:
        condition: service_healthy
    command:
      - "mongosh"
      - "--quiet"
      - "mongodb://mongo:mongo@mongodb:27017/?authSource=admin"
      - "--eval"
      - "try { rs.status().ok } catch (e) { rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]}) }"
    restart: "no"

  server-postgres:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: server-postgres
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=jsonb_experiments
      - DB=postgres
      - PORT=3001
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 3001:3001
    depends_on:
      postgres:
        condition: service_healthy

  server-mongo:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: server-mongo
    restart: always
    environment:
      - DB=mongo
      - PORT=3002
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=jsonb_experiments
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 3002:3002
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully

  writer-postgres:
    build: ./clients/writer
    container_name: writer-postgres
    restart: always
    environment:
      - CLIENT_BASE_URL=http://server-postgres:3001
    depends_on:
      - server-postgres

  writer-mongo:
    build: ./clients/writer
    container_name: writer-mongo
    restart: always
    environment:
      - CLIENT_BASE_URL=http://server-mongo:3002
    depends_on:
      - server-mongo

  reader-postgres:
    build: ./clients/reader
    container_name: reader-postgres
    restart: always
    environment:
      - CLIENT_BASE_URL=http://server-postgres:3001
    depends_on:
      - server-postgres

  reader-mongo:
    build: ./clients/reader
    container_name: reader-mongo
    restart: always
    environment:
      - CLIENT_BASE_URL=http://server-mongo:3002
    depends_on:
      - server-mongo

  # cadvisor:
  #   image: gcr.io/cadvisor/cadvisor:v0.49.1
  #   container_name: cadvisor
  #   restart: always
  #   ports:
  #     - 8080:8080
  #   volumes:
  #     - /:/rootfs:ro
  #     - /var/run:/var/run:ro
  #     - /sys:/sys:ro
  #     - /sys/fs/cgroup:/sys/fs/cgroup:ro
  #     - /var/lib/docker/:/var/lib/docker:ro
  #     - /dev/disk/:/dev/disk:ro
  #   devices:
  #     - /dev/kmsg
  #   privileged: true

  cgroup-exporter:
    build: ./monitoring/cgroup-exporter
    container_name: cgroup-exporter
    restart: always
    privileged: true
    volumes:
      - /sys/fs/cgroup:/host/sys/fs/cgroup:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 9100:9100

  postgres-hit-read-stats-exporter:
    build: ./monitoring/postgres-hit-read-stats-exporter
    container_name: postgres-hit-read-stats-exporter
    restart: always
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 9101:9101
    depends_on:
      postgres:
        condition: service_healthy

  pg-table-size-exporter:
    build: ./monitoring/pg-table-size-exporter
    container_name: pg-table-size-exporter
    restart: always
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 9102:9102
    depends_on:
      postgres:
        condition: service_healthy

  mongo-collection-size-exporter:
    build: ./monitoring/mongo-collection-size-exporter
    container_name: mongo-collection-size-exporter
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=jsonb_experiments
    ports:
      - 9103:9103
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully

  mongo-hit-read-stats-exporter:
    build: ./monitoring/mongo-hit-read-stats-exporter
    container_name: mongo-hit-read-stats-exporter
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=jsonb_experiments
    ports:
      - 9104:9104
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully

  pg-total-relation-size-exporter:
    build: ./monitoring/pg-total-relation-size-exporter
    container_name: pg-total-relation-size-exporter
    restart: always
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 9105:9105
    depends_on:
      postgres:
        condition: service_healthy

  mongo-total-size-exporter:
    build: ./monitoring/mongo-total-size-exporter
    container_name: mongo-total-size-exporter
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=jsonb_experiments
    ports:
      - 9106:9106
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully

  pg-query-time-exporter:
    build: ./monitoring/pg-query-time-exporter
    container_name: pg-query-time-exporter
    restart: always
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGUSER=postgres
      - PGPASSWORD=postgres
      - PGDATABASE=postgres
    ports:
      - 9107:9107
    depends_on:
      postgres:
        condition: service_healthy

  mongo-query-time-exporter:
    build: ./monitoring/mongo-query-time-exporter
    container_name: mongo-query-time-exporter
    restart: always
    environment:
      - MONGO_URI=mongodb://mongo:mongo@mongodb:27017/?replicaSet=rs0&authSource=admin
      - MONGO_DB=jsonb_experiments
    ports:
      - 9108:9108
    depends_on:
      mongodb:
        condition: service_healthy
      mongo-rs-init:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - 9090:9090
    depends_on:
      - cgroup-exporter
      - postgres-hit-read-stats-exporter
      - pg-table-size-exporter
      - mongo-collection-size-exporter
      - mongo-hit-read-stats-exporter
      - pg-total-relation-size-exporter
      - mongo-total-size-exporter
      - pg-query-time-exporter
      - mongo-query-time-exporter

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - 3100:3100
    volumes:
      - loki-data:/loki

  promtail:
    image: grafana/promtail:latest
    container_name: promtail
    restart: always
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - 3000:3000
    depends_on:
      - prometheus

  # pgadmin:
  #   image: dpage/pgadmin4
  #   ports:
  #     - "5050:80"
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@example.com
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #   volumes:
  #     - ./pgadmin-data:/var/lib/pgadmin

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  mongo-keyfile: