global:
  scrape_interval: 5s

scrape_configs:
  - job_name: cgroup-exporter
    static_configs:
      - targets: ["cgroup-exporter:9100"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9101"]

  - job_name: pg-table-size-exporter
    static_configs:
      - targets: ["pg-table-size-exporter:9102"]
